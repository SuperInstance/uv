# Hawk analyzes the `uv` binary and workspace tests as a closed world; retain public API outside those graphs.
# Invoke with `--exclude-crate uv_keyring`; that vendored crate retains its public client API.
# Keep each retained finding expected so removing it requires deleting this entry.

[[override]]
lint = "hawk::dead_public"
crate = "uv_dispatch"
item = "BuildDispatch::<'a>::with_build_extra_env_vars"
level = "expect"
reason = "retained library API outside the selected binary graph"

[[override]]
lint = "hawk::dead_public"
crate = "uv_trampoline_builder"
item = "Launcher::write_to_file"
level = "expect"
target = "cfg(not(windows))"
reason = "used by the Windows uv command when analyzing a non-Windows target"

